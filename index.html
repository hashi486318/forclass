          "新しいビジネスや価値を生み出す起業家・革新者",
        ],
      },
    ];

    // 固定回答データ (4つのタイプ)
    const resultTypes = {
      0: {
        type: "ロジカル・アナリスト",
        icon: "🔬",
        tagline: "緻密な分析で真実を見抜く知性派",
        description: "データや事実をベースに、論理的かつ客観的に物事を整理するのが得意なタイプです。複雑な問題の本質を見抜き、確実でミスのないアウトプットを出すことでチームの信頼を獲得します。計画性があり冷静沈着なスペシャリストです。",
        roles: ["データサイエンティスト", "システムエンジニア", "財務・会計", "研究・開発職"],
        strength: "正確性の高い論理的思考と問題解決力",
        tip: "正論だけでなく、周囲の感情や背景にも少し配慮すると協力者が増えて物事がスムーズに動きます。"
      },
      1: {
        type: "ハーモニー・サポーター",
        icon: "🤝",
        tagline: "チームを繋ぎ寄り添う共感の要",
        description: "周囲の人々の感情やニーズに敏感で、良好な人間関係を築くことに長けたタイプです。傾聴力が高く、チームの衝突を防ぎながら全員が心地よく働ける環境を整えます。サポート役として不可欠な、信頼の厚い人情派です。",
        roles: ["人事・採用", "カスタマーサクセス", "キャリアカウンセラー", "プロジェクトコーディネーター"],
        strength: "優れた傾聴力とチームの心理的安全性向上",
        tip: "周囲を優先しすぎて自分を後回しにしがちです。時には自分の意見や要望もはっきりと主張してみましょう。"
      },
      2: {
        type: "リバティ・パイオニア",
        icon: "🚀",
        tagline: "常識を打破する圧倒的推進力",
        description: "目標達成に向けて強いコミットメントを持ち、スピード感を持って全体を引っ張るタイプです。決断力があり、ピンチの場面でもフットワーク軽く動き回ることで突破口を開きます。成果にこだわり、現状を打破していくリーダー気質です。",
        roles: ["プロジェクトマネージャー", "新規開拓営業", "事業開発", "スタートアップ起業家"],
        strength: "抜群の行動力と目標に対する強い執着心",
        tip: "スピードが早すぎて周囲が置いてけぼりになることがあります。適度に立ち止まり、進捗を共有することを意識しましょう。"
      },
      3: {
        type: "クリエイティブ・イノベーター",
        icon: "💡",
        tagline: "ゼロから価値を生み出す閃きの天才",
        description: "既存の枠組みにとらわれず、ユニークなアイデアや斬新な視点を提案できるタイプです。変化や新しい挑戦を好み、抽象的な概念を直感で形にすることを楽しめます。退屈なルーティンを壊し、新しい風を吹き込む変革者です。",
        roles: ["クリエイティブディレクター", "企画・マーケター", "UI/UXデザイナー", "商品開発"],
        strength: "独自の視点から生まれる豊かな発想力",
        tip: "アイデアを出す一方で、着地させるためのディテールや計画が甘くなりやすいので、得意な人と組むのが吉です。"
      }
    };

    // ─── State ──────────────────────────────────────────────
    let state = {
      step: "intro",   // intro | quiz | loading | result
      current: 0,
      answers: [],
      selected: null,
      result: null,
      error: null,
    };

    // ─── Render ─────────────────────────────────────────────
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      if (state.step === "intro")   app.appendChild(renderIntro());
      if (state.step === "quiz")    app.appendChild(renderQuiz());
      if (state.step === "loading") app.appendChild(renderLoading());
      if (state.step === "result")  app.appendChild(renderResult());
    }

    // INTRO
    function renderIntro() {
      const wrap = el("div", { class: "fade-in", style: "text-align:center" });

      wrap.innerHTML = `
        <div style="font-size:56px;margin-bottom:16px">🧭</div>
        <h1 class="font-cinzel text-accent"
            style="font-size:clamp(24px,5vw,36px);letter-spacing:0.05em;margin-bottom:8px">
          仕事タイプ診断
        </h1>
        <p class="text-muted" style="font-size:14px;letter-spacing:0.1em;margin-bottom:32px">
          WORK TYPE DIAGNOSIS
        </p>
        <div class="card" style="border-radius:16px;padding:28px 32px;margin-bottom:32px">
          <p class="font-crimson text-main" style="font-size:16px;line-height:1.8">
            20の質問に答えるだけで、AIがあなたの
            <strong class="text-accent">仕事タイプ・向いている役割</strong>を分析します。
            正直に、直感で選んでください。
          </p>
        </div>
        ${state.error ? `<p style="color:#ff6b6b;font-size:13px;margin-bottom:12px">${state.error}</p>` : ""}
      `;

      const btn = el("button", { class: "cta-btn" });
      btn.textContent = "診断を始める →";
      btn.onclick = () => { state.step = "quiz"; render(); };
      wrap.appendChild(btn);

      return wrap;
    }

    // QUIZ
    function renderQuiz() {
      const q = questions[state.current];
      const pct = Math.round((state.current / questions.length) * 100);

      const wrap = el("div", { class: "fade-in" });

      // Progress
      const progress = el("div", { style: "margin-bottom:28px" });
      progress.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span class="text-muted" style="font-size:12px;letter-spacing:0.1em">
            Q ${state.current + 1} / ${questions.length}
          </span>
          <span class="font-cinzel text-accent" style="font-size:12px">${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      `;
      wrap.appendChild(progress);

      // Card
      const card = el("div", { class: "card" });

      const qText = el("h2", { class: "font-crimson text-main" });
      qText.style.cssText = "font-size:clamp(16px,3.5vw,20px);font-weight:400;line-height:1.6;margin-bottom:24px";
      qText.textContent = q.text;
      card.appendChild(qText);

      // Options
      const opts = el("div");
      q.options.forEach((opt, idx) => {
        const btn = el("button", { class: "opt-btn" + (state.selected === opt ? " chosen" : "") });

        const circle = el("span", { class: "opt-circle" });
        circle.textContent = state.selected === opt ? "✓" : "";
        btn.appendChild(circle);

        const label = document.createTextNode(opt);
        btn.appendChild(label);

        btn.onclick = () => {
          state.selected = opt;
          opts.querySelectorAll(".opt-btn").forEach((b, i) => {
            const isChosen = questions[state.current].options[i] === opt;
            b.classList.toggle("chosen", isChosen);
            const c = b.querySelector(".opt-circle");
            c.textContent = isChosen ? "✓" : "";
          });
          const nextBtn = card.querySelector(".next-btn");
          nextBtn.classList.remove("inactive");
          nextBtn.classList.add("active");
          nextBtn.disabled = false;
        };
        opts.appendChild(btn);
      });
      card.appendChild(opts);

      // Next button
      const nextBtn = el("button", {
        class: "next-btn " + (state.selected ? "active" : "inactive"),
      });
      nextBtn.textContent = state.current + 1 === questions.length ? "診断する" : "次へ →";
      nextBtn.disabled = !state.selected;
      nextBtn.onclick = () => {
        if (!state.selected) return;
        const curQ = questions[state.current];
        // 選ばれた選択肢のインデックス(0~3)を保存
        const selectedIdx = curQ.options.indexOf(state.selected);
        state.answers.push(selectedIdx);
        
        state.selected = null;
        if (state.current + 1 < questions.length) {
          state.current++;
          render();
        } else {
          runDiagnosis();
        }
      };
      card.appendChild(nextBtn);

      wrap.appendChild(card);
      return wrap;
    }

    // LOADING
    function renderLoading() {
      const wrap = el("div", { class: "fade-in", style: "text-align:center;padding:60px 0" });
      wrap.innerHTML = `
        <div class="spinner"></div>
        <p class="font-cinzel text-accent"
           style="font-size:15px;letter-spacing:0.1em;animation:pulse 2s infinite">
          AIが分析中...
        </p>
        <p class="text-muted" style="font-size:13px;margin-top:8px">
          あなたの回答をもとに診断しています
        </p>
      `;
      return wrap;
    }

    // RESULT
    function renderResult() {
      const r = state.result;
      const wrap = el("div", { class: "fade-in" });

      const card = el("div", {
        style: "background:rgba(255,255,255,0.05);border:1px solid rgba(232,200,124,0.3);border-radius:24px;padding:36px 32px;backdrop-filter:blur(10px);text-align:center"
      });

      card.innerHTML = `
        <div style="font-size:64px;margin-bottom:12px">${r.icon}</div>
        <p class="text-muted" style="font-size:11px;letter-spacing:0.2em;margin-bottom:6px">
          あなたの仕事タイプは
        </p>
        <h2 class="font-cinzel text-accent"
            style="font-size:clamp(22px,5vw,30px);letter-spacing:0.05em;margin-bottom:8px">
          ${r.type}
        </h2>
        <p class="font-crimson text-main"
           style="font-style:italic;font-size:16px;margin-bottom:24px;opacity:0.8">
          ${r.tagline}
        </p>
        <div class="divider"></div>
        <p class="font-crimson text-main"
           style="font-size:15px;line-height:1.8;margin-bottom:24px;text-align:left">
          ${r.description}
        </p>
        <div style="background:rgba(232,200,124,0.15);border:1px solid rgba(232,200,124,0.25);border-radius:12px;padding:12px 16px;margin-bottom:24px;text-align:left">
          <span class="text-muted" style="font-size:11px;letter-spacing:0.1em">💪 最大の強み</span>
          <p class="font-crimson text-accent" style="font-size:15px;margin-top:4px;font-weight:600">
            ${r.strength}
          </p>
        </div>
        <div style="margin-bottom:24px;text-align:left">
          <p class="text-muted" style="font-size:11px;letter-spacing:0.1em;margin-bottom:10px">
            🎯 向いている職種・役割
          </p>
          <div>
            ${r.roles.map(role => `<span class="role-tag">${role}</span>`).join("")}
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;margin-bottom:28px;text-align:left">
          <span class="text-muted" style="font-size:11px;letter-spacing:0.1em">✨ 成長のヒント</span>
          <p class="font-crimson text-main" style="font-size:14px;margin-top:4px;line-height:1.7;opacity:0.85">
            ${r.tip}
          </p>
        </div>
      `;

      const retryBtn = el("button", { class: "retry-btn" });
      retryBtn.textContent = "もう一度診断する";
      retryBtn.onclick = () => {
        state = { step: "intro", current: 0, answers: [], selected: null, result: null, error: null };
        render();
      };
      card.appendChild(retryBtn);
      wrap.appendChild(card);
      return wrap;
    }

    // ─── 集計・タイプ判定ロジック（固定出力） ──────────────────────
    function runDiagnosis() {
      state.step = "loading";
      render();

      // ローディング演出用に1秒待機させてから結果を表示
      setTimeout(() => {
        // 回答(0~3)の出現回数をカウント
        const counts = { 0: 0, 1: 0, 2: 0, 3: 0 };
        state.answers.forEach(ans => {
          counts[ans] = (counts[ans] || 0) + 1;
        });

        // 最も多く選択されたインデックスを特定
        let maxType = 0;
        let maxCount = -1;
        for (let i = 0; i < 4; i++) {
          if (counts[i] > maxCount) {
            maxCount = counts[i];
            maxType = i;
          }
        }

        // 固定データから結果を代入
        state.result = resultTypes[maxType];
        state.step = "result";
        render();
      }, 1200);
    }

    // ─── Helper ──────────────────────────────────────────────
    function el(tag, attrs = {}) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
      return node;
    }

    // ─── Boot ────────────────────────────────────────────────
    render();
  </script>
