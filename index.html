<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>仕事タイプ診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      padding: 24px;
    }

    #app {
      width: 100%;
      max-width: 560px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    .fade-in { animation: fadeIn 0.6s ease forwards; }

    /* Spinner */
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(232,200,124,0.2);
      border-top-color: #e8c87c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 28px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    /* Option buttons */
    .opt-btn {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      color: #f0eaff;
      text-align: left;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .opt-btn:last-of-type { margin-bottom: 0; }
    .opt-btn:hover {
      background: rgba(232,200,124,0.2);
      border-color: #e8c87c;
    }
    .opt-btn, .opt-btn:hover, .opt-btn.chosen { transition: none; }
    .opt-btn.chosen {
      background: rgba(232,200,124,0.25);
      border-color: #e8c87c;
    }

    .opt-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #1a1430;
      font-weight: 700;
    }
    .opt-btn.chosen .opt-circle {
      border-color: #e8c87c;
      background: #e8c87c;
    }

    /* CTA button */
    .cta-btn {
      background: #e8c87c;
      color: #1a1430;
      border: none;
      padding: 14px 40px;
      border-radius: 40px;
      font-size: 16px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(232,200,124,0.3);
    }
    .cta-btn:hover {
      background: #d4b46a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,200,124,0.4);
    }

    /* Next button */
    .next-btn {
      margin-top: 24px;
      width: 100%;
      border: none;
      padding: 13px;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .next-btn.active {
      background: #e8c87c;
      color: #1a1430;
    }
    .next-btn.active:hover {
      background: #d4b46a;
      transform: translateY(-2px);
    }
    .next-btn.inactive {
      background: rgba(255,255,255,0.08);
      color: rgba(240,234,255,0.5);
      cursor: not-allowed;
    }

    /* Progress bar */
    .progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e8c87c, #f0d090);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* Role tags */
    .role-tag {
      display: inline-block;
      background: rgba(232,200,124,0.12);
      border: 1px solid rgba(232,200,124,0.3);
      color: #e8c87c;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      margin: 4px;
      font-family: 'Crimson Pro', serif;
    }

    /* Retry button */
    .retry-btn {
      background: transparent;
      color: #e8c87c;
      border: 1px solid #e8c87c;
      padding: 12px 32px;
      border-radius: 40px;
      font-size: 14px;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.05em;
    }
    .retry-btn:hover {
      background: rgba(232,200,124,0.1);
      transform: translateY(-2px);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 0 0 24px;
    }

    /* Utility */
    .text-accent  { color: #e8c87c; }
    .text-main    { color: #f0eaff; }
    .text-muted   { color: rgba(240,234,255,0.5); }
    .font-cinzel  { font-family: 'Cinzel', serif; }
    .font-crimson { font-family: 'Crimson Pro', serif; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ─── Data ───────────────────────────────────────────────
    const questions = [
      {
        text: "プロジェクトが始まるとき、あなたは最初に何をしますか？",
        options: [
          "全体の計画を立てて、チームに役割を割り振る",
          "自分のパートを深く調査・研究し始める",
          "関係者と話して、ニーズをヒアリングする",
          "とにかくアイデアをどんどん出してみる",
        ],
      },
      {
        text: "チームで意見が対立したとき、あなたはどうしますか？",
        options: [
          "データや根拠を示して、論理的に説得する",
          "双方の意見を聞いて、落としどころを探る",
          "自分のビジョンを強く主張してリードする",
          "新しい第三の案を提案して場を打開する",
        ],
      },
      {
        text: "仕事で最もやりがいを感じる瞬間はどれですか？",
        options: [
          "複雑な問題を解き明かしたとき",
          "誰かの役に立てたと実感したとき",
          "プロジェクトが成功して目標を達成したとき",
          "誰も思いつかなかったアイデアが形になったとき",
        ],
      },
      {
        text: "理想の職場環境はどれに近いですか？",
        options: [
          "静かに集中できる個人作業中心の環境",
          "活発なコミュニケーションがある賑やかな環境",
          "明確なルールと役割がある整理された環境",
          "自由に挑戦できる変化の多い環境",
        ],
      },
      {
        text: "ミスをしたとき、あなたはどう対処しますか？",
        options: [
          "原因を徹底分析して、再発防止策を作る",
          "まず周りに謝罪・報告し、関係修復を優先する",
          "素早く立て直し、次の行動に切り替える",
          "その失敗から新しいアプローチのヒントを探す",
        ],
      },
      {
        text: "締め切りが迫っているとき、あなたはどう動きますか？",
        options: [
          "優先順位を整理して、計画的にこなす",
          "チームに声をかけて協力を求める",
          "とにかく手を動かして間に合わせる",
          "効率化できる方法を考えてから取りかかる",
        ],
      },
      {
        text: "新しいスキルを身につけるとき、どんな方法を選びますか？",
        options: [
          "本や資料を読んで体系的に理解する",
          "誰かに教えてもらいながら実践する",
          "まず試してみて、失敗しながら覚える",
          "なぜ必要かを理解してからじっくり学ぶ",
        ],
      },
      {
        text: "あなたが最も得意なコミュニケーションスタイルは？",
        options: [
          "論理的・構造的に説明する",
          "相手の気持ちに寄り添いながら話す",
          "端的・結論ファーストで伝える",
          "例えや比喩を使って分かりやすく伝える",
        ],
      },
      {
        text: "仕事の評価で最も嬉しいフィードバックはどれですか？",
        options: [
          "「あなたの分析は正確で信頼できる」",
          "「チームの雰囲気が良くなったのはあなたのおかげ」",
          "「結果を出してくれてありがとう」",
          "「その発想は誰も思いつかなかった」",
        ],
      },
      {
        text: "リーダーに求める最も重要な資質は何ですか？",
        options: [
          "明確なビジョンと決断力",
          "メンバーへの共感と信頼関係",
          "目標達成への強いコミット",
          "新しい発想で道を切り開く力",
        ],
      },
      {
        text: "自由な時間が突然できたら、仕事に関して何をしますか？",
        options: [
          "業界のトレンドや技術を調べる",
          "同僚や知人と情報交換する",
          "積み残しのタスクを片付ける",
          "新しいアイデアをノートに書き出す",
        ],
      },
      {
        text: "あなたにとって「良い仕事」とは何ですか？",
        options: [
          "品質が高く、ミスのない仕事",
          "関わる人全員が満足している仕事",
          "期限内に成果を出した仕事",
          "これまでにない価値を生んだ仕事",
        ],
      },
      {
        text: "困難な課題に直面したとき、まず何をしますか？",
        options: [
          "問題を細かく分解して整理する",
          "信頼できる人に相談する",
          "とにかく動いて突破口を探す",
          "前例や他分野からヒントを探す",
        ],
      },
      {
        text: "会議中のあなたの行動に近いのはどれですか？",
        options: [
          "データや事実を整理して発言する",
          "他のメンバーの意見を引き出す",
          "議題を前に進めようと積極的に発言する",
          "議論に新しい視点を加える",
        ],
      },
      {
        text: "仕事でストレスを感じる場面はどれですか？",
        options: [
          "不正確な情報や根拠のない決定",
          "チームの雰囲気が悪くなったとき",
          "成果が出ない・目標が達成できないとき",
          "ルーティンばかりで変化がないとき",
        ],
      },
      {
        text: "あなたが自然と担う役割はどれですか？",
        options: [
          "情報を整理してまとめる役",
          "メンバーのフォローをする役",
          "全体を引っ張るリーダー役",
          "斬新なアイデアを出す役",
        ],
      },
      {
        text: "長期的なキャリアで最も重視することは？",
        options: [
          "専門性・スペシャリストとしての深み",
          "人との繋がりと信頼の積み重ね",
          "実績・成果のトラックレコード",
          "常に新しい挑戦と変化",
        ],
      },
      {
        text: "チームへの貢献として最も自信があることは？",
        options: [
          "正確で質の高いアウトプット",
          "メンバーのモチベーション維持",
          "スピードと推進力",
          "ユニークな発想や問題解決策",
        ],
      },
      {
        text: "あなたにとって理想の上司像は？",
        options: [
          "明確な指示と基準を示してくれる人",
          "個人の成長を応援してくれる人",
          "権限を委譲して任せてくれる人",
          "一緒に新しいことに挑戦してくれる人",
        ],
      },
      {
        text: "10年後の自分に最も近いイメージはどれですか？",
        options: [
          "その道のプロフェッショナルとして頼られる存在",
          "多くの人から信頼され、相談される存在",
          "大きな組織やプロジェクトをまとめるリーダー",
          "新しいビジネスや価値を生み出す起業家・革新者",
        ],
      },
    ];

    // ─── State ──────────────────────────────────────────────
    let state = {
      step: "intro",   // intro | quiz | loading | result
      current: 0,
      answers: [],
      selected: null,
      result: null,
      error: null,
    };

    // ─── Render ─────────────────────────────────────────────
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      if (state.step === "intro")   app.appendChild(renderIntro());
      if (state.step === "quiz")    app.appendChild(renderQuiz());
      if (state.step === "loading") app.appendChild(renderLoading());
      if (state.step === "result")  app.appendChild(renderResult());
    }

    // INTRO
    function renderIntro() {
      const wrap = el("div", { class: "fade-in", style: "text-align:center" });

      wrap.innerHTML = `
        <div style="font-size:56px;margin-bottom:16px">🧭</div>
        <h1 class="font-cinzel text-accent"
            style="font-size:clamp(24px,5vw,36px);letter-spacing:0.05em;margin-bottom:8px">
          仕事タイプ診断
        </h1>
        <p class="text-muted" style="font-size:14px;letter-spacing:0.1em;margin-bottom:32px">
          WORK TYPE DIAGNOSIS
        </p>
        <div class="card" style="border-radius:16px;padding:28px 32px;margin-bottom:32px">
          <p class="font-crimson text-main" style="font-size:16px;line-height:1.8">
            20の質問に答えるだけで、AIがあなたの
            <strong class="text-accent">仕事タイプ・向いている役割</strong>を分析します。
            正直に、直感で選んでください。
          </p>
        </div>
        ${state.error ? `<p style="color:#ff6b6b;font-size:13px;margin-bottom:12px">${state.error}</p>` : ""}
      `;

      const btn = el("button", { class: "cta-btn" });
      btn.textContent = "診断を始める →";
      btn.onclick = () => { state.step = "quiz"; render(); };
      wrap.appendChild(btn);

      return wrap;
    }

    // QUIZ
    function renderQuiz() {
      const q = questions[state.current];
      const pct = Math.round((state.current / questions.length) * 100);

      const wrap = el("div", { class: "fade-in" });

      // Progress
      const progress = el("div", { style: "margin-bottom:28px" });
      progress.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span class="text-muted" style="font-size:12px;letter-spacing:0.1em">
            Q ${state.current + 1} / ${questions.length}
          </span>
          <span class="font-cinzel text-accent" style="font-size:12px">${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      `;
      wrap.appendChild(progress);

      // Card
      const card = el("div", { class: "card" });

      const qText = el("h2", { class: "font-crimson text-main" });
      qText.style.cssText = "font-size:clamp(16px,3.5vw,20px);font-weight:400;line-height:1.6;margin-bottom:24px";
      qText.textContent = q.text;
      card.appendChild(qText);

      // Options
      const opts = el("div");
      q.options.forEach((opt) => {
        const btn = el("button", { class: "opt-btn" + (state.selected === opt ? " chosen" : "") });

        const circle = el("span", { class: "opt-circle" });
        circle.textContent = state.selected === opt ? "✓" : "";
        btn.appendChild(circle);

        const label = document.createTextNode(opt);
        btn.appendChild(label);

        btn.onclick = () => {
          state.selected = opt;
          opts.querySelectorAll(".opt-btn").forEach((b, idx) => {
            const isChosen = questions[state.current].options[idx] === opt;
            b.classList.toggle("chosen", isChosen);
            const c = b.querySelector(".opt-circle");
            c.textContent = isChosen ? "✓" : "";
          });
          const nextBtn = card.querySelector(".next-btn");
          nextBtn.classList.remove("inactive");
          nextBtn.classList.add("active");
          nextBtn.disabled = false;
        };
        opts.appendChild(btn);
      });
      card.appendChild(opts);

      // Next button
      const isLast = state.current + 1 === questions.length;
      const nextBtn = el("button", {
        class: "next-btn " + (state.selected ? "active" : "inactive"),
      });
      nextBtn.textContent = isLast ? "診断する" : "次へ →";
      nextBtn.disabled = !state.selected;
      nextBtn.onclick = () => {
        if (!state.selected) return;
        state.answers.push({ q: q.text, a: state.selected });
        state.selected = null;
        if (state.current + 1 < questions.length) {
          state.current++;
          render();
        } else {
          runDiagnosis();
        }
      };
      card.appendChild(nextBtn);

      wrap.appendChild(card);
      return wrap;
    }

    // LOADING
    function renderLoading() {
      const wrap = el("div", { class: "fade-in", style: "text-align:center;padding:60px 0" });
      wrap.innerHTML = `
        <div class="spinner"></div>
        <p class="font-cinzel text-accent"
           style="font-size:15px;letter-spacing:0.1em;animation:pulse 2s infinite">
          AIが分析中...
        </p>
        <p class="text-muted" style="font-size:13px;margin-top:8px">
          あなたの回答をもとに診断しています
        </p>
      `;
      return wrap;
    }

    // RESULT
    function renderResult() {
      const r = state.result;
      const wrap = el("div", { class: "fade-in" });

      const card = el("div", {
        style: "background:rgba(255,255,255,0.05);border:1px solid rgba(232,200,124,0.3);border-radius:24px;padding:36px 32px;backdrop-filter:blur(10px);text-align:center"
      });

      card.innerHTML = `
        <div style="font-size:64px;margin-bottom:12px">${r.icon}</div>
        <p class="text-muted" style="font-size:11px;letter-spacing:0.2em;margin-bottom:6px">
          あなたの仕事タイプは
        </p>
        <h2 class="font-cinzel text-accent"
            style="font-size:clamp(22px,5vw,30px);letter-spacing:0.05em;margin-bottom:8px">
          ${r.type}
        </h2>
        <p class="font-crimson text-main"
           style="font-style:italic;font-size:16px;margin-bottom:24px;opacity:0.8">
          ${r.tagline}
        </p>
        <div class="divider"></div>
        <p class="font-crimson text-main"
           style="font-size:15px;line-height:1.8;margin-bottom:24px;text-align:left">
          ${r.description}
        </p>
        <div style="background:rgba(232,200,124,0.15);border:1px solid rgba(232,200,124,0.25);border-radius:12px;padding:12px 16px;margin-bottom:24px;text-align:left">
          <span class="text-muted" style="font-size:11px;letter-spacing:0.1em">💪 最大の強み</span>
          <p class="font-crimson text-accent" style="font-size:15px;margin-top:4px;font-weight:600">
            ${r.strength}
          </p>
        </div>
        <div style="margin-bottom:24px;text-align:left">
          <p class="text-muted" style="font-size:11px;letter-spacing:0.1em;margin-bottom:10px">
            🎯 向いている職種・役割
          </p>
          <div>
            ${r.roles.map(role => `<span class="role-tag">${role}</span>`).join("")}
          </div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;margin-bottom:28px;text-align:left">
          <span class="text-muted" style="font-size:11px;letter-spacing:0.1em">✨ 成長のヒント</span>
          <p class="font-crimson text-main" style="font-size:14px;margin-top:4px;line-height:1.7;opacity:0.85">
            ${r.tip}
          </p>
        </div>
      `;

      const retryBtn = el("button", { class: "retry-btn" });
      retryBtn.textContent = "もう一度診断する";
      retryBtn.onclick = () => {
        state = { step: "intro", current: 0, answers: [], selected: null, result: null, error: null };
        render();
      };
      card.appendChild(retryBtn);
      wrap.appendChild(card);
      return wrap;
    }

    // ─── API Call ────────────────────────────────────────────
    async function runDiagnosis() {
      state.step = "loading";
      render();

      const prompt = `あなたは仕事タイプ診断の専門家です。以下のユーザーの回答を分析し、職種・役割タイプを診断してください。

回答一覧:
${state.answers.map((a, i) => `Q${i + 1}: ${a.q}\n→ ${a.a}`).join("\n\n")}

以下のJSON形式のみで回答してください（説明文やMarkdownコードブロックは不要）:
{
  "type": "タイプ名（例：戦略家リーダー）",
  "icon": "絵文字1文字",
  "tagline": "キャッチコピー（20字以内）",
  "description": "このタイプの特徴と強みの説明（100字程度）",
  "roles": ["向いている職種・役割1", "向いている職種・役割2", "向いている職種・役割3"],
  "strength": "最大の強み（30字以内）",
  "tip": "成長のためのアドバイス（50字程度）"
}`;

      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }],
          }),
        });
        const data = await res.json();
        const text = data.content.map(b => b.text || "").join("");
        const clean = text.replace(/```json|```/g, "").trim();
        state.result = JSON.parse(clean);
        state.step = "result";
      } catch (e) {
        state.error = "診断中にエラーが発生しました。もう一度お試しください。";
        state.step = "intro";
        state.current = 0;
        state.answers = [];
      }
      render();
    }

    // ─── Helper ──────────────────────────────────────────────
    function el(tag, attrs = {}) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
      return node;
    }

    // ─── Boot ────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
